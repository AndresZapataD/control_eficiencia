spring.application.name=eficiencia

# ===============================
# DATABASE - MYSQL
# ===============================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:33065/sistema_productividad?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ===============================
# JWT CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:clave_super_secreta_1234567890_la_cual_debe_ser_muy_larga_para_seguridad}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ===============================
# SERVER
# ===============================
server.port=8080
server.servlet.context-path=/
server.error.include-message=always
server.error.include-stacktrace=on_param

# ===============================
# LOGGING
# ===============================
logging.level.root=INFO
logging.level.com.eficiencia=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# ACTUATOR (Health Check)
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized